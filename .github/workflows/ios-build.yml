name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manuel tetikleme butonu

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js (static export)
        run: npm run build

      - name: 🔄 Sync Capacitor
        run: npx cap sync ios

      - name: 💎 Install CocoaPods
        run: |
          gem install cocoapods
          cd ios/App
          pod install

      - name: 🔐 Setup signing (unsigned build for testing)
        run: |
          cd ios/App
          # Disable automatic signing for unsigned build
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/' App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/' App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/' App.xcodeproj/project.pbxproj

      - name: 🛠️ Build iOS (simulator - no signing needed)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📦 Package simulator app
        run: |
          mkdir -p artifacts
          cd ios/App/build/Build/Products/Release-iphonesimulator
          zip -r $GITHUB_WORKSPACE/artifacts/ThePavyon-simulator.zip *.app

      - name: ⬆️ Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ThePavyon-iOS-Simulator
          path: artifacts/
          retention-days: 30
