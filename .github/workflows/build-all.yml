name: Build All
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Deps
        run: npm ci

      - name: Generate Prisma
        run: npx prisma generate

      - name: Prep Static Export (Remove API)
        run: rm -rf src/app/api

      - name: Remove server.js for static export
        run: |
          cp server.js server.js.bak || true
          rm -f server.js

      - name: Build Web
        run: npm run build
        env:
          IS_CAPACITOR: "true"

      - name: Restore server.js
        run: mv server.js.bak server.js || true

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Setup API Key
        run: |
          mkdir -p ~/.private_keys
          echo '${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}' > ~/.private_keys/AuthKey.p8

      - name: Build Archive
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        run: |
          cd ios/App
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        run: |
          cd ios/App
          xcrun altool --upload-app \
            --type ios \
            --file "build/export/App.ipa" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: ios/App/build/export/App.ipa
          if-no-files-found: ignore


  build-android:
    name: Build Android Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Deps
        run: npm ci
      - name: Generate Prisma
        run: npx prisma generate
      - name: Prep Static Export (Remove API)
        run: rm -rf src/app/api
      - name: Remove server.js for static export
        run: |
          cp server.js server.js.bak || true
          rm -f server.js
      - name: Build Web
        run: npm run build
        env:
          IS_CAPACITOR: "true"
      - name: Fix Android Assets Prefix
        run: |
          if [ -d "out" ]; then
            cd out
            mv _next assets_next || true
            grep -rl "_next" . | xargs sed -i 's/_next/assets_next/g' || true
            cd ..
          else
            echo "out klasörü bulunamadı, devam ediliyor"
          fi
      - name: Restore server.js
        run: mv server.js.bak server.js || true
      - name: Capacitor Sync
        run: npx cap sync android
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build Android Bundle & APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          ./gradlew assembleRelease

      - name: Upload ProGuard Mapping
        uses: actions/upload-artifact@v4
        with:
          name: Android-Mapping
          path: android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore

      - name: Upload Native Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: Android-Native-Symbols
          path: android/app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip
          if-no-files-found: ignore
      - name: Upload Android Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Android-Bundle-PlayConsole
          path: android/app/build/outputs/bundle/release/app-release.aab
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk
