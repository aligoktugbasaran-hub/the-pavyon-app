name: iOSTest
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Sync
        run: npx cap sync ios

      - name: Build App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -sdk iphonesimulator -configuration Release -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AppBundle
          path: ios/App/build/Build/Products/Release-iphonesimulator/App.app
