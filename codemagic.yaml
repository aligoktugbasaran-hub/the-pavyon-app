workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.thepavyon.app"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "App.xcodeproj"
        TEAM_ID: "RYPLW7PTDR"
        APP_STORE_CONNECT_KEY_ID: "CZV2847494"
        APP_STORE_CONNECT_ISSUER_ID: "9571d02a-8a64-4839-8fb7-f98bde3fba41"
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate Prisma
        script: npx prisma generate
      - name: Prep Static Export
        script: |
          rm -rf src/app/api
          cp server.js server.js.bak || true
          rm -f server.js
      - name: Build Web
        script: IS_CAPACITOR=true npm run build
      - name: Restore server.js
        script: mv server.js.bak server.js || true
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          printf '%s' "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "=== Cert size ==="
          ls -la /tmp/cert.p12
          echo "=== Profile size ==="
          ls -la /tmp/profile.mobileprovision
          echo "=== Profile check ==="
          security cms -D -i /tmp/profile.mobileprovision > /dev/null 2>&1 && echo "Profile OK" || echo "Profile INVALID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          keychain initialize
          security import /tmp/cert.p12 -k ~/Library/codemagic-cli-tools/keychains/*.keychain-db -P "$CM_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "" ~/Library/codemagic-cli-tools/keychains/*.keychain-db
          xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Build Archive
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App
    artifacts:
      - ios/App/build/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
