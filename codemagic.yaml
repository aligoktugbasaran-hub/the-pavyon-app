workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.thepavyon.app"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "App.xcodeproj"
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate Prisma
        script: npx prisma generate
      - name: Prep Static Export
        script: |
          rm -rf src/app/api
          cp server.js server.js.bak || true
          rm -f server.js
      - name: Build Web
        script: IS_CAPACITOR=true npm run build
      - name: Restore server.js
        script: mv server.js.bak server.js || true
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=RYPLW7PTDR"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
